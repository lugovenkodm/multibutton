<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мультикнопка для сайта</title>
    <style>
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            background: #ffffff; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2d3436;
            padding: 20px;
            box-sizing: border-box;
        }

        .hero {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .card {
            background: white;
            padding: 40px 20px;
            border-radius: 30px;
            border: 1px solid #f0f0f0; /* Легкая рамка вместо тени */
            box-shadow: none; 
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: clamp(1.5rem, 8vw, 2.5rem);
            margin: 0 0 15px 0;
            letter-spacing: -1px;
            line-height: 1.2;
        }

        p {
            color: #636e72;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            margin: 0;
        }

        html, body {
            overflow-x: hidden;
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="card">
            <h1>Мультикнопка для сайта</h1>
            <p>Нажмите на синюю кнопку в нижнем углу для проверки анимации мессенджеров</p>
        </div>
    </div>

    <script src="widget.js"></script>
</body>
</html>
